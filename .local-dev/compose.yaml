name: the-attic-ai
services:
  admin:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: attic_admin
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    volumes:
      - ${NOMAD_ROOT:?}/storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh
      - ./wait-for-it.sh:/usr/local/bin/wait-for-it.sh
    environment:
      - NODE_ENV=production
      - PORT=8080
      - LOG_LEVEL=debug
      - APP_KEY=${APP_KEY:?}
      - HOST=0.0.0.0
      - URL=http://${NOMAD_IP:-127.0.0.1}:8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      - DB_PASSWORD=${DB_USER_PASSWORD:?}
      - DB_NAME=nomad
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?}
      - NOMAD_STORAGE_PATH=${NOMAD_ROOT:?}/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  mysql:
    image: mysql:8.0
    container_name: attic_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:?}
      - MYSQL_DATABASE=nomad
      - MYSQL_USER=nomad_user
      - MYSQL_PASSWORD=${DB_USER_PASSWORD:?}
    volumes:
      - ${NOMAD_ROOT:?}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: attic_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?}
    volumes:
      - ${NOMAD_ROOT:?}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
